kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080 # ArgoCD UI
      - containerPort: 30090
        hostPort: 30090 # Prometheus
      - containerPort: 30030
        hostPort: 30030 # Grafana
      - containerPort: 30093
        hostPort: 30093 # Alertmanager
  - role: worker
  - role: worker
